<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>星野澪 AI</title>
<style>
#chat { max-width: 400px; margin: 20px auto; border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; }
input { width: 300px; }
button { width: 80px; }
</style>
</head>
<body>
<h3>星野澪 AI 聊天</h3>
<div id="chat"></div>
<input id="input" placeholder="说点什么..." />
<button onclick="send()">发送</button>

<script>
let affection = 50;
let intimacy = 30;
let mood = "neutral";
let session_id = "user_" + Date.now(); // 简单 session 标识

async function send() {
    const input = document.getElementById("input").value;
    if(!input) return;

    addMessage("你", input);

    const res = await fetch("https://你的railway域名/chat", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            session_id,
            message: input,
            affection,
            intimacy,
            mood
        })
    });

    const data = await res.json();
    affection = data.affection;
    intimacy = data.intimacy;
    mood = data.mood;

    addMessage("澪", data.reply);
}

function addMessage(who, text) {
    const chat = document.getElementById("chat");
    chat.innerHTML += `<b>${who}:</b> ${text}<br>`;
    chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
